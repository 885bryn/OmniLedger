name: house-erp-prod

services:
  frontend:
    image: ghcr.io/${GHCR_OWNER}/omniledger-frontend:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      NAS_STATIC_IP: ${NAS_STATIC_IP}
      API_URL: http://${NAS_STATIC_IP}:${FRONTEND_PORT:-8085}/api
    ports:
      - "${FRONTEND_PORT:-8085}:80"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1/ >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy

  backend:
    image: ghcr.io/${GHCR_OWNER}/omniledger-backend:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-hact_prod}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      HACT_ADMIN_EMAIL: ${HACT_ADMIN_EMAIL}
      FRONTEND_ORIGIN: http://${NAS_STATIC_IP}:${FRONTEND_PORT:-8085}
      STARTUP_DB_MAX_RETRIES: ${STARTUP_DB_MAX_RETRIES:-30}
      STARTUP_DB_RETRY_MS: ${STARTUP_DB_RETRY_MS:-2000}
      API_URL: http://${NAS_STATIC_IP}:${FRONTEND_PORT:-8085}/api
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8080/health').then((response)=>{if(!response.ok){process.exit(1);}}).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hact_prod}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /volume1/docker/house-erp/db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 12
