name: Publish Production Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Release tag for backend/frontend images
        required: true
        type: string
      include_latest:
        description: Also publish latest tags
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  GHCR_OWNER: ${{ github.repository_owner }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ inputs.image_tag }}"
          OWNER_LOWER="$(printf '%s' "${GHCR_OWNER}" | tr '[:upper:]' '[:lower:]')"

          BACKEND_TAGS="ghcr.io/${OWNER_LOWER}/house-erp-backend:${IMAGE_TAG}"
          FRONTEND_TAGS="ghcr.io/${OWNER_LOWER}/house-erp-frontend:${IMAGE_TAG}"

          if [ "${{ inputs.include_latest }}" = "true" ]; then
            BACKEND_TAGS="${BACKEND_TAGS},ghcr.io/${OWNER_LOWER}/house-erp-backend:latest"
            FRONTEND_TAGS="${FRONTEND_TAGS},ghcr.io/${OWNER_LOWER}/house-erp-frontend:latest"
          fi

          {
            echo "backend_tags=${BACKEND_TAGS}"
            echo "frontend_tags=${FRONTEND_TAGS}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.tags.outputs.backend_tags }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.tags.outputs.frontend_tags }}
